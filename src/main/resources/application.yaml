spring:

  application:
    name: asset-management-system

  datasource:
    url: jdbc:mysql://localhost:3306/asset_management_db
    username: root
    password: monu@2003
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:

    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

management:

  endpoints:

    web:

      exposure:

        include: health,info,metrics,prometheus

  endpoint:

    health:

      show-details: always

  prometheus:

    metrics:

      export:

        enabled: true